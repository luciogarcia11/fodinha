version: '3.8'

services:
  backend:
    build: .
    container_name: fodinha-backend
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - sqlite_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001

  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    command: caddy reverse-proxy --from 104.248.238.227.nip.io --to fodinha-backend:3001

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:
